server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index login.html;

  location = / {
    try_files /login.html =404;
  }

  location ~* \.(?:html|js|css)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /login.html;
  }
}
