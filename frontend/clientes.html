<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickLand Store | Clientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/api.js" defer></script>
  <script src="js/ui.js" defer></script>
</head>
<body data-page="clientes" data-nav="clientes">
  <div class="app">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-mark">B</span><span><strong>BrickLand Store</strong><span>Operations Console</span></span></a>
      <nav>
        <div class="nav-group"><span class="nav-label">Operacion</span><a class="nav-link" data-nav="dashboard" href="index.html">Dashboard</a><a class="nav-link" data-nav="productos" href="productos.html">Productos</a><a class="nav-link" data-nav="clientes" href="clientes.html">Clientes</a><a class="nav-link" data-nav="ventas" href="ventas.html">Ventas</a></div>
        <div class="nav-group"><span class="nav-label">Administracion</span><a class="nav-link" data-nav="empleados" href="empleados.html">Empleados</a><a class="nav-link" data-nav="proveedores" href="proveedores.html">Proveedores</a><a class="nav-link" data-nav="reportes" href="reportes/index.html">Reportes SQL</a></div>
      </nav>
    </aside>
    <main class="main">
      <section class="topline">
        <div><p class="eyebrow">Clientes</p><h1>Gestion de clientes</h1><p>Crea, edita y elimina clientes de la base comercial.</p></div>
        <button class="btn secondary" id="btnRecargar" type="button">Recargar datos</button>
      </section>
      <section id="alerta" class="alert hidden"></section>
      <section class="grid split">
        <article class="card">
          <div class="card-header"><div><p class="eyebrow">Cliente</p><h2 id="clienteFormTitle">Crear cliente</h2></div><button class="btn ghost hidden" id="btnCancelarCliente" type="button">Cancelar</button></div>
          <form class="form" id="clienteForm">
            <input type="hidden" id="clienteId">
            <div class="form-row">
              <div class="field"><label for="clienteNombre">Nombre</label><input id="clienteNombre" type="text" required></div>
              <div class="field"><label for="clienteApellido">Apellido</label><input id="clienteApellido" type="text"></div>
            </div>
            <div class="form-row">
              <div class="field"><label for="clienteTelefono">Telefono</label><input id="clienteTelefono" type="text"></div>
              <div class="field"><label for="clienteEmail">Email</label><input id="clienteEmail" type="email"></div>
            </div>
            <div class="form-row">
              <div class="field"><label for="clienteNit">NIT</label><input id="clienteNit" type="text"></div>
              <div class="field"><label for="clienteFecha">Fecha de registro</label><input id="clienteFecha" type="date" required></div>
            </div>
            <button class="btn primary full" type="submit">Guardar cliente</button>
          </form>
        </article>
        <article class="card">
          <div class="card-header"><div><p class="eyebrow">Directorio</p><h2>Clientes registrados</h2></div><span class="pill" id="clientesCounter">0 registros</span></div>
          <div class="table-wrap" id="clientesTable"><p class="loading">Cargando...</p></div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
