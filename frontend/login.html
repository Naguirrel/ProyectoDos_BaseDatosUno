<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickLand Store | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/api.js?v=auth-fix-2" defer></script>
  <script src="js/auth.js?v=auth-fix-2" defer></script>
</head>
<body data-public="true">
  <main class="login-layout">
    <section class="card login-card">
      <a class="brand" href="login.html"><span class="brand-mark">B</span><span><strong>BrickLand Store</strong><span>Operations Console</span></span></a>
      <div class="card-header">
        <div>
          <p class="eyebrow">Acceso seguro</p>
          <h1>Iniciar sesion</h1>
          <p>Usa las credenciales configuradas para el sistema.</p>
        </div>
      </div>
      <section id="alerta" class="alert hidden"></section>
      <form class="form" id="loginForm">
        <div class="field"><label for="username">Usuario</label><input id="username" type="text" value="proy2" required autocomplete="username"></div>
        <div class="field"><label for="password">Password</label><input id="password" type="password" value="secret" required autocomplete="current-password"></div>
        <button class="btn primary full" id="btnLogin" type="submit">Ingresar</button>
      </form>
    </section>
  </main>
</body>
</html>
